name: Download and patch
env:
  GAME_ID: "game.qualiarts.idolypride"

on:
  schedule:
    - cron: 0 18 * * *
  workflow_dispatch:
    inputs:
      skip_version_check:
        description: "Skip version check and force build"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_version_check }}
    outputs:
      continue: ${{ steps.ver_check.outputs.continue }}
      apk_version: ${{ steps.ver_check.outputs.apk_version }}
      game_file_base: ${{ steps.ver_check.outputs.game_file_base }}
      game_apk_name: ${{ steps.ver_check.outputs.game_apk_name }}
      game_cloned_name: ${{ steps.ver_check.outputs.game_cloned_name }}

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest tag and compare with existing
        id: ver_check
        run: bash ver_check.sh

  build:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ always() && (inputs.skip_version_check || needs.check.outputs.continue == 'true') }}

    env:
      APK_VERSION: ${{ needs.check.outputs.apk_version }}
      GAME_FILE_BASE: ${{ needs.check.outputs.game_file_base }}
      GAME_APK_NAME: ${{ needs.check.outputs.game_apk_name }}
      GAME_CLONED_NAME: ${{ needs.check.outputs.game_cloned_name }}

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set env vars (skip mode)
        if: ${{ inputs.skip_version_check }}
        run: bash ver_check.sh --env-only

      - name: Download and prepare modules
        run: bash download_modules.sh

      - name: Set up JRE 21
        uses: actions/setup-java@v5.0.0
        with:
          distribution: "zulu"
          java-version: "21"
          java-package: "jre"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install UnityPy

      - name: Download and prepare APK file
        run: |
          bash play_downloader.sh ${{ env.GAME_ID }}
          java -jar APKEditor.jar m -i ${{ env.GAME_ID }} -o ${{ env.GAME_APK_NAME }}

      - name: Patch game font
        run: bash patch_game_font.sh

      - name: Prepare cloned APK file
        run: bash clone.sh

      - name: Patch the APK files
        run: bash patch.sh

      - name: Create a Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Idoly Pride ${{ env.APK_VERSION }} patch build. Use the '_embedded' APK for updates. The '_cloned' APK is the alternate package build."
          tag_name: ${{ env.APK_VERSION }}
          make_latest: true
          preserve_order: true
          files: |
            ${{ env.LOCALIFY_KR_NAME }}
            ${{ env.EMBED_APK_CLONED }}
            ${{ env.EMBED_APK }}
            ${{ env.PATCHED_APK }}
